name: E2E Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: e2e-test-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: FORMAWORK.AI
  SERVICE_NAME: web
  SUPABASE_URL: http://127.0.0.1:62021
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:62021
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:62022/postgres

jobs:
  medium-e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # browser: [chromium, webkit]
        browser: [chromium]

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Node.js のセットアップ
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      - name: Playwright ブラウザのインストール
        # userSetupProject で chromium を使うため常に chromium はインストール
        run: pnpm --filter web exec playwright install --with-deps chromium ${{ matrix.browser }}

      - name: Supabase CLI のセットアップ
        uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2.0.0
        with:
          # supabase/cli v2.99.0 でリリースアセットの命名規則が変わり、
          # setup-cli が期待する `supabase_linux_amd64.tar.gz` が消えて 404 になるため、
          # 直前の正常リリース v2.98.2 を暫定的に固定する。
          # 参考: https://github.com/supabase/cli/issues/5257
          version: 2.98.2

      - name: Supabase の起動
        run: |
          pnpm -w supabase:start && pnpm -w supabase:seed
      - name: データベースリセット
        run: pnpm -w db:reset
      - name: Next.js のビルド
        run: pnpm --filter web build

      - name: E2E テストの実行
        run: pnpm -w test:e2e --project=${{ matrix.browser }}

      - name: テストレポートのアップロード
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: テスト結果アップロード
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: apps/web/test-results/
          retention-days: 7
