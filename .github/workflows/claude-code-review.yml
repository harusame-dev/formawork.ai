name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-code-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  claude-review:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Claude Code レビューの実行
        id: claude-review
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        env:
          CONTEXT7_API_KEY: ${{secrets.CONTEXT7_API_KEY}}
        with:
          show_full_output: true
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            reviewing-code スキルを使って本プルリクのレビューを行ってください。
            - REPO: ${{ github.repository }}
            - PR NUMBER: ${{ github.event.pull_request.number }}

            Bash ツールで `gh pr comment` を使用して、レビュー結果を PR のコメントとして残してください。

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Skill(reviewing-code),Skill(searching-library-reference)"'
